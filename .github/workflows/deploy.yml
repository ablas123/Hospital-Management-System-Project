name: 🚀 Clean and Deploy Hospital System

on:
  push:
    branches:
      - main  # أو اسم الفرع الخاص بك

jobs:
  web-deploy:
    name: 🎉 Clean and Sync Files
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v3

      - name: 📂 Sync to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./htdocs/
          # هذه الأسطر هي السحر: ستحذف كل شيء قديم وترفع الجديد فقط
          clean: true 
          dangerous-clean-slate: true 
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
